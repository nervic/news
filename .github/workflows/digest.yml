name: Daily News Digest

on:
  schedule:
    # 06:00 UTC = 08:00 Serbia time (CEST, UTC+2 in summer)
    - cron: '0 6 * * *'
    # 14:00 UTC = 16:00 Serbia time (CEST, UTC+2 in summer)
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Lets you trigger a manual run anytime from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push updated digest
        run: |
          git config user.name  "news-digest-bot"
          git config user.email "bot@news-digest"
          git add docs/
          git diff --cached --quiet || git commit -m "digest: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
